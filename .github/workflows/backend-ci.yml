name: CI

on:
  push:
    branches: [main]
    paths:
      - 'builders/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'builders/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: oven-sh/setup-bun@v2
      - run: uv sync
      - run: cd frontend && bun install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: SKIP=pytest uv run pre-commit run --all-files
      - run: SKIP=pytest uv run pre-commit run --all-files --hook-stage pre-push

  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest --ignore=builders/server/tests/integration

  backend-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest -m integration builders/server/tests/integration/

services:
  postgres:
    build:
      context: ./postgres
    env_file: .env
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datastream -d datastream"]
      interval: 2s
      timeout: 5s
      retries: 10

  builder:
    build:
      context: ..
      dockerfile: infra/builder/Dockerfile
    env_file: .env
    volumes:
      - ../builders/scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/status || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - internal

  pgweb:
    image: sosedoff/pgweb:latest
    command: ["--readonly", "--bind=0.0.0.0", "--listen=8080"]
    environment:
      PGWEB_DATABASE_URL: postgresql://datastream_readonly:readonly@postgres:5432/datastream?sslmode=disable
    depends_on:
      builder:
        condition: service_healthy
    networks:
      - internal

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      builder:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:

services:
  postgres:
    build:
      context: ./postgres
    env_file: .env
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datastream -d datastream"]
      interval: 2s
      timeout: 5s
      retries: 10

  builder:
    build:
      context: ..
      dockerfile: infra/builder/Dockerfile
    env_file: .env
    volumes:
      - ../builders/scripts:/app/scripts
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/status || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - internal

  pgweb:
    image: sosedoff/pgweb:latest
    command: ["--readonly", "--bind=0.0.0.0", "--listen=8080"]
    environment:
      PGWEB_DATABASE_URL: postgresql://datastream_readonly:readonly@postgres:5432/datastream?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      builder:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

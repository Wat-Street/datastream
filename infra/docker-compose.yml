services:
  postgres:
    build:
      context: ./postgres
    env_file: .env
    ports:
      - "5432:5432"
    networks:
      - internal

  builder:
    build:
      context: ..
      dockerfile: infra/builder/Dockerfile
    env_file: .env
    volumes:
      - ../builders/scripts:/app/scripts
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - internal

networks:
  internal:
    driver: bridge
